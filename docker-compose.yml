name: ${PROJECT_NAME:-bank-test-platform}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [backend]

  jenkins:
    build:
      context: .
      dockerfile: infra/jenkins/Dockerfile
    environment:
      JAVA_OPTS: '-Djenkins.install.runSetupWizard=false -Dhudson.model.DirectoryBrowserSupport.CSP= -Duser.language=en -Duser.country=US -Dorg.jvnet.localizer.LocaleProvider=org.jvnet.localizer.LocaleProvider$$DefaultLocaleProvider'
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_USER}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      JENKINS_PUBLIC_URL: "http://127.0.0.1:8086"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${JENKINS_PORT:-8086}:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./infra/jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/login >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 20
    networks: [backend]

  bank-api:
    build:
      context: .
      dockerfile: services/bank-api/Dockerfile
    env_file: .env
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${BANK_API_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jenkins:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${AUTH_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      bank-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      bank-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  frontend-cabinet:
    build:
      context: .
      dockerfile: frontends/cabinet/Dockerfile
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${CABINET_PORT}:80"
    depends_on:
      - api-gateway
    networks: [backend]

volumes:
  postgres_data:
  jenkins_data:

networks:
  backend:
