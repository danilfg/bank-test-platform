[pytest]
python_files = test_*.py
testpaths = tests
markers =
    auth: Authentication service scenarios.
    dashboard: Student dashboard API scenarios.
    employees: Student employees API scenarios.
    clients: Student clients API scenarios.
    jenkins: Jenkins integration API scenarios.
    allure: Allure integration API scenarios.
    postgres: PostgreSQL tool access scenarios.
    rest_api: Student REST API and docs scenarios.
asyncio_default_fixture_loop_scope = function
