                $ref: '#/components/schemas/TicketMessageCreatedPayload'
    TicketMessageCreatedByStudentEvent:
      name: ticketMessageCreatedByStudent
      title: Ticket Message Created By Student Event
      payload:
        allOf:
          - $ref: '#/components/schemas/EventEnvelopeBase'
          - type: object
            properties:
              event_type: { const: ticket.message.created.by_student }
              payload:
                $ref: '#/components/schemas/TicketMessageCreatedByStudentPayload'
    JenkinsJobRunEvent:
      name: jenkinsJobRun
      title: Jenkins Job Run Event
      payload:
        allOf:
          - $ref: '#/components/schemas/EventEnvelopeBase'
          - type: object
            properties:
              event_type: { const: jenkins.job.run }
              payload:
                $ref: '#/components/schemas/JenkinsJobRunPayload'
    UsageUpdatedEvent:
      name: usageUpdated
      title: Usage Updated Event
